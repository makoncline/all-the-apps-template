name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/all-the-apps-template-web:${{ github.event.workflow_run.head_sha }}
          file: ./apps/web/Dockerfile

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/all-the-apps-template-server:${{ github.event.workflow_run.head_sha }}
          file: ./apps/server/Dockerfile

      - name: Build and push deploy hook image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/all-the-apps-template-deploy-hook:${{ github.event.workflow_run.head_sha }}
          file: ./infra/deploy/Dockerfile

      - name: Notify deploy hook
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PAYLOAD="{\"sha\":\"${DEPLOY_SHA}\"}"
          SIGNATURE=$(printf '%s' "${PAYLOAD}" | openssl dgst -sha256 -hmac "${DEPLOY_WEBHOOK_SECRET}" -binary | xxd -p -c 256)
          curl -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-signature: sha256=${SIGNATURE}" \
            --data "${PAYLOAD}"
